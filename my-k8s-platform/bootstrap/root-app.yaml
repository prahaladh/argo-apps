apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/prahaladh/argo-apps.git
    targetRevision: HEAD
    path: argocd-apps      # Points to the folder containing Child Apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd      # This MUST be 'argocd'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true